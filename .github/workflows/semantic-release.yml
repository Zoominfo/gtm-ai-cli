name: Semantic Release

on:
  workflow_dispatch:

jobs:
  publish-version:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        id: app-token
        with:
          client-id: ${{ vars.HOMEBREW_CLIENT_ID }}
          private-key: ${{ secrets.HOMEBREW_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        name: 'Checkout'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          fetch-depth: '0'
          persist-credentials: 'false'

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.x'

      - name: Install Dependencies
        run: |
          npm ci --no-fund --no-audit

      - name: Semantic Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_AUTHOR_NAME: zoominfo-bot
          GIT_AUTHOR_EMAIL: zoominfo-bot@zoominfo.com
          GIT_COMMITTER_NAME: zoominfo-bot
          GIT_COMMITTER_EMAIL: zoominfo-bot@zoominfo.com
        run: |
          npx semantic-release@25
