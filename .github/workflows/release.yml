name: Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        id: app-token
        with:
          client-id: ${{ vars.HOMEBREW_CLIENT_ID }}
          private-key: ${{ secrets.HOMEBREW_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: 'false'
          token: '${{ steps.app-token.outputs.token }}'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install

      - name: Build binaries
        run: bun run build:all

      - name: Sign binaries
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          for bin in dist/gtm-macos-arm64 dist/gtm-macos-x64 dist/gtm-linux-x64 dist/gtm-windows-x64.exe; do
            echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 \
              --pinentry-mode loopback --detach-sign --armor "$bin"
          done

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          files: |
            dist/gtm-macos-arm64
            dist/gtm-macos-arm64.asc
            dist/gtm-macos-x64
            dist/gtm-macos-x64.asc
            dist/gtm-linux-x64
            dist/gtm-linux-x64.asc
            dist/gtm-windows-x64.exe
            dist/gtm-windows-x64.exe.asc

  update-homebrew-tap:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        id: app-token
        with:
          client-id: ${{ vars.HOMEBREW_CLIENT_ID }}
          private-key: ${{ secrets.HOMEBREW_PRIVATE_KEY }}
          owner: Zoominfo
          repositories: homebrew-gtm-ai

      - name: Checkout tap repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: Zoominfo/homebrew-gtm-ai
          token: '${{ steps.app-token.outputs.token }}'

      - name: Update Formula
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF_NAME#v}
          BASE="https://github.com/Zoominfo/gtm-ai-cli/releases/download/${GITHUB_REF_NAME}"
          for bin in gtm-macos-arm64 gtm-macos-x64 gtm-linux-x64; do
            curl -fsSL "${BASE}/${bin}" -o "/tmp/${bin}"
          done
          ARM64_SHA=$(shasum -a 256 /tmp/gtm-macos-arm64 | awk '{print $1}')
          X64_SHA=$(shasum -a 256 /tmp/gtm-macos-x64 | awk '{print $1}')
          LINUX_X64_SHA=$(shasum -a 256 /tmp/gtm-linux-x64 | awk '{print $1}')
          echo "{\"version\": \"${VERSION}\", \"macOsArmSha\": \"${ARM64_SHA}\", \"macOsX64Sha\": \"${X64_SHA}\", \"linuxX64Sha\": \"${LINUX_X64_SHA}\"}" > data.json
          npx mustache data.json templates/gtm-ai-cli.rb.mustache Formula/gtm-ai-cli.rb
          
          git config user.name zoominfo-bot
          git config user.email zoominfo-bot@zoominfo.com
          git add Formula/gtm-ai-cli.rb
          git commit -m "chore: update gtm-ai-cli to ${{ github.ref_name }}"
          git push
